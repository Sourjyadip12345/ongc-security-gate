  STEP 1 — Create a Google Apps Script Web App
  ─────────────────────────────────────────────
  a) Open https://script.google.com
  b) Click "New Project"
  c) Replace the code with the Apps Script below (see APPS SCRIPT section)
  d) Click Deploy → New Deployment → Web App
  e) Set "Execute as" = Me, "Who has access" = Anyone
  f) Copy the Web App URL and paste it into APPS_SCRIPT_URL below
 
  APPS SCRIPT (paste this at script.google.com):
  ───────────────────────────────────────────────
  const MANPOWER_SHEET_ID = "18sV7weOCJJucTXWXKuiktg3JO9CUBWcJiWKLa_a-cMc";
  const POB_SHEET_ID      = "1Gx1YTD5UTSa3KCiumj_kxEJ836Zk7Mw_X0B4Cv5NbMY";
 
  function doPost(e) {
    const data = JSON.parse(e.postData.contents);
    if (data.action === "updateManpower") updateManpower(data);
    if (data.action === "updatePOB")      updatePOB(data);
    return ContentService.createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  }
 
  function doGet(e) {
    return ContentService.createTextOutput(JSON.stringify({status:"running"}))
      .setMimeType(ContentService.MimeType.JSON);
  }
 
  function updateManpower(data) {
    const ss = SpreadsheetApp.openById(MANPOWER_SHEET_ID);
    const sheet = ss.getSheets()[0];
    const allValues = sheet.getDataRange().getValues();
    for (let i = 0; i < allValues.length; i++) {
      const row = allValues[i];
      for (let j = 0; j < row.length; j++) {
        if (String(row[j]).trim() === data.name.trim()) {
          // Status is in the next column after Mobile
          sheet.getRange(i+1, j+3).setValue(data.status);
        }
      }
    }
    // Update totals for the category
    updateCategoryTotal(sheet, data.category, data.presentCount);
  }
 
  function updateCategoryTotal(sheet, category, count) {
    const allValues = sheet.getDataRange().getValues();
    for (let i = 0; i < allValues.length; i++) {
      if (String(allValues[i][3]).trim() === "Total Present" &&
          i > 0 && String(allValues[i-1][4]).trim() !== "") {
        // Find the right category block by checking header row above
      }
      if (String(allValues[i][4]).trim() === "Total Present") {
        const catHeader = findCategoryHeader(allValues, i, category);
        if (catHeader) {
          sheet.getRange(i+1, 5).setValue(count);
        }
      }
    }
  }
 
  function findCategoryHeader(values, totalRow, category) {
    for (let i = totalRow; i >= 0; i--) {
      if (String(values[i][0]).trim().toLowerCase() === category.toLowerCase()) return true;
    }
    return false;
  }
 
  function updatePOB(data) {
    const ss = SpreadsheetApp.openById(POB_SHEET_ID);
    const sheet = ss.getSheets()[0];
    const allValues = sheet.getDataRange().getValues();
    // Update timestamp
    sheet.getRange(1,2).setValue(new Date());
    sheet.getRange(2,2).setValue(Utilities.formatDate(new Date(), Session.getScriptTimeZone(), "d/M/yyyy"));
    // Update each category count
    for (let i = 0; i < allValues.length; i++) {
      const agencyName = String(allValues[i][0]).trim().toLowerCase();
      for (const [cat, count] of Object.entries(data.counts)) {
        if (agencyName === cat.toLowerCase()) {
          sheet.getRange(i+1, 2).setValue(count);
        }
      }
    }
  }

    .personnel-grid { grid-template-columns: 1fr; }

    .stat-box { padding: 6px 10px; min-width: 54px; }

// ============================================================
// STATE (localStorage persistence between page reloads)
// ============================================================
function loadState() {
  try {
    const saved = localStorage.getItem('pob_state_v2');
    if (!saved) return;
    const state = JSON.parse(saved);
    categories.forEach(cat => {
      cat.personnel.forEach(p => {
        if (state[p.id] !== undefined) p.status = state[p.id];
      });
    });
  } catch(e) {}
}
 
function saveState() {
  const state = {};
  categories.forEach(cat => cat.personnel.forEach(p => { state[p.id] = p.status; }));
  localStorage.setItem('pob_state_v2', JSON.stringify(state));
}
 
loadState();
 
// ============================================================
// GOOGLE SHEETS SYNC
// ============================================================
let syncQueue = [];
let isSyncing = false;
const syncEl = document.getElementById('syncStatus');
 
function setSyncStatus(state, msg) {
  syncEl.className = 'sync-status ' + state;
  syncEl.textContent = msg;
}
 
// Check if URL is configured
function isConfigured() {
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "PASTE_YOUR_WEB_APP_URL_HERE";
}
 
async function pushToSheets(person, cat) {
  if (!isConfigured()) {
    setSyncStatus('error', '⚠ URL NOT SET');
    return;
  }
 
  // Build POB counts map (maps sheetKey to category)
  const pobCounts = {};
  categories.forEach(c => {
    pobCounts[c.sheetKey] = countOn(c);
  });
 
  // Queue both updates
  syncQueue.push({
    action: 'updateManpower',
    name: person.name,
    status: person.status === 'on' ? 'On' : 'Off',
    category: cat.sheetKey,
    presentCount: countOn(cat)
  });
  syncQueue.push({
    action: 'updatePOB',
    counts: pobCounts
  });
 
  processQueue();
}
 
async function processQueue() {
  if (isSyncing || syncQueue.length === 0) return;
  isSyncing = true;
  setSyncStatus('syncing', '↑ SYNCING...');
 
  while (syncQueue.length > 0) {
    const payload = syncQueue.shift();
    try {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
    } catch(e) {
      setSyncStatus('error', '✗ SYNC FAILED');
      syncQueue.unshift(payload); // requeue
      isSyncing = false;
      setTimeout(processQueue, 5000); // retry after 5s
      return;
    }
  }
 
  isSyncing = false;
  setSyncStatus('ok', '✓ SYNCED');
  setTimeout(() => {
    if (!isSyncing) setSyncStatus('idle', '⬤ READY');
  }, 3000);
}
 
// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN', { hour12: false });
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-IN', {
    weekday: 'short', day: '2-digit', month: 'short', year: 'numeric'
  });
}
updateClock();
setInterval(updateClock, 1000);
 
// ============================================================
// COUNTS
// ============================================================
function countOn(cat) { return cat.personnel.filter(p => p.status === 'on').length; }
function totalPOB()   { return categories.reduce((s, c) => s + countOn(c), 0); }
 
// ============================================================
// RENDER POB BANNER
// ============================================================
function renderPOBBanner() {
  document.getElementById('totalPOB').textContent = totalPOB();
  document.getElementById('pobBreakdown').innerHTML = categories.map(cat => `
    <div class="pob-chip">
      <div class="pob-chip-dot" style="background:${cat.color}"></div>
      <span style="color:var(--muted);font-size:12px">${cat.name}</span>
      <span class="pob-chip-count" style="color:${cat.color}">${countOn(cat)}</span>
    </div>`).join('');
}
 
// ============================================================
// TABS
// ============================================================
let activeTab = categories[0].id;
 
function renderTabs() {
  document.getElementById('tabsBar').innerHTML = categories.map(cat => `
    <button class="tab-btn ${cat.id === activeTab ? 'active' : ''}"
            onclick="switchTab('${cat.id}')"
            style="${cat.id === activeTab ? `color:${cat.color};border-bottom-color:${cat.color}` : ''}">
      ${cat.name}
      <span class="tab-count">${countOn(cat)}</span>
    </button>`).join('');
}
 
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.category-section').forEach(el => el.classList.remove('active'));
  document.getElementById('sec-' + id)?.classList.add('active');
  renderTabs();
  const inp = document.querySelector('#sec-' + id + ' .search-input');
  if (inp) { inp.value = ''; filterPersonnel('', id); }
}
 
// ============================================================
// RENDER SECTIONS
// ============================================================
function renderSections() {
  document.getElementById('sectionsContainer').innerHTML = categories.map(cat => `
    <div class="category-section ${cat.id === activeTab ? 'active' : ''}" id="sec-${cat.id}">
      <div class="section-header">
        <div class="section-title" style="color:${cat.color}">
          <div class="section-dot" style="background:${cat.color};color:${cat.color}"></div>
          ${cat.name}
        </div>
        <div class="section-stats">
          <div class="stat-box">
            <div class="stat-num on" id="onCount-${cat.id}">${countOn(cat)}</div>
            <div class="stat-label">ON SITE</div>
          </div>
          <div class="stat-box">
            <div class="stat-num off" id="offCount-${cat.id}">${cat.personnel.length - countOn(cat)}</div>
            <div class="stat-label">OFF SITE</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" style="color:var(--muted)">${cat.personnel.length}</div>
            <div class="stat-label">TOTAL</div>
          </div>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search personnel..." oninput="filterPersonnel(this.value,'${cat.id}')">
      </div>
      <div class="personnel-grid" id="grid-${cat.id}">
        ${cat.personnel.map(p => personCardHTML(p, cat)).join('')}
      </div>
    </div>`).join('');
}
 
function personCardHTML(p, cat) {
  const isOn = p.status === 'on';
  return `
    <div class="person-card ${isOn ? 'on-site' : ''}" id="card-${p.id}" onclick="togglePerson('${p.id}','${cat.id}')">
      <div class="person-checkbox">
        <span class="check-mark">✓</span>
      </div>
      <div class="person-info">
        <div class="person-name">${p.name}</div>
        <div class="person-meta">${p.mobile ? '📱 ' + p.mobile : 'No mobile registered'}</div>
      </div>
      <div class="status-badge ${isOn ? 'on' : 'off'}" id="badge-${p.id}">${isOn ? 'ON' : 'OFF'}</div>
    </div>`;
}
 
// ============================================================
// TOGGLE — updates UI + pushes to Google Sheets
// ============================================================
function togglePerson(personId, catId) {
  const cat = categories.find(c => c.id === catId);
  const p   = cat.personnel.find(x => x.id === personId);
  p.status  = p.status === 'on' ? 'off' : 'on';
  const isOn = p.status === 'on';
 
  const card = document.getElementById('card-' + personId);
  isOn ? card.classList.add('on-site') : card.classList.remove('on-site');
  card.classList.remove('just-updated');
  void card.offsetWidth;
  card.classList.add('just-updated');
 
  const badge = document.getElementById('badge-' + personId);
  badge.textContent = isOn ? 'ON' : 'OFF';
  badge.className = 'status-badge ' + (isOn ? 'on' : 'off');
 
  updateCounts(cat);
  renderPOBBanner();
  renderTabs();
  saveState();
 
  // Push to Google Sheets
  pushToSheets(p, cat);
 
  showToast(p.name, isOn, cat);
}
 
function updateCounts(cat) {
  const on = countOn(cat);
  document.getElementById('onCount-' + cat.id).textContent = on;
  document.getElementById('offCount-' + cat.id).textContent = cat.personnel.length - on;
}
 
// ============================================================
// SEARCH / FILTER
// ============================================================
function filterPersonnel(query, catId) {
  const cat = categories.find(c => c.id === catId);
  const q   = query.toLowerCase().trim();
  const grid = document.getElementById('grid-' + catId);
  const list = q ? cat.personnel.filter(p => p.name.toLowerCase().includes(q) || p.mobile.includes(q)) : cat.personnel;
  grid.innerHTML = list.length
    ? list.map(p => personCardHTML(p, cat)).join('')
    : '<div class="empty-state">No personnel found.</div>';
}
 
// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(name, isOn, cat) {
  const toast = document.getElementById('toast');
  toast.className = 'toast ' + (isOn ? 'toast-in' : 'toast-out');
  toast.innerHTML = `
    <span style="font-size:20px">${isOn ? '✅' : '🔴'}</span>
    <div>
      <div style="font-weight:600;font-size:14px">${name}</div>
      <div style="font-size:12px;color:var(--muted)">${cat.name} · ${isOn ? 'Entered Installation' : 'Exited Installation'}</div>
    </div>`;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}
 
// ============================================================
// INIT
// ============================================================
renderSections();
renderTabs();
renderPOBBanner();
setSyncStatus(isConfigured() ? 'idle' : 'error',
              isConfigured() ? '⬤ READY' : '⚠ URL NOT SET');
</script>
